<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABU Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        /* --- OLD UI --- */
        #old-ui {
            position: fixed; inset: 0; background: #008080;
            display: flex; justify-content: center; align-items: center; z-index: 10;
            transition: transform 0.6s ease-in, opacity 0.4s;
        }

        /* Yeh class hawa mein udne ka effect degi */
        .fly-away {
            transform: translateX(120%) skewX(-15deg);
            opacity: 0;
        }

        .win98-box {
            background: #c0c0c0; border: 2px solid #fff;
            border-right-color: #000; border-bottom-color: #000;
            width: 280px; padding: 20px; text-align: center;
        }

        .btn {
            margin-top: 15px; padding: 10px 20px; background: #c0c0c0;
            border: 2px solid #fff; border-right-color: #000; border-bottom-color: #000;
            cursor: pointer; font-weight: bold;
        }

        /* --- FUTURE UI --- */
        #future-ui {
            position: fixed; inset: 0; background: #020617;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #22d3ee; opacity: 0; transition: opacity 0.8s;
            padding: 20px; overflow-y: auto;
        }
        #future-ui.active { opacity: 1; }

        .neon-title { font-size: 3rem; margin-bottom: 20px; text-shadow: 0 0 10px #22d3ee; }

        .project {
            background: rgba(34, 211, 238, 0.1); width: 100%; max-width: 400px;
            padding: 15px; margin-bottom: 10px; border-left: 4px solid #22d3ee;
        }
    </style>
</head>
<body>

    <div id="old-ui">
        <div class="win98-box">
            <h2 style="color: #000; font-size: 18px;">BABU_OS</h2>
            <p style="color: #000; margin-top: 10px;">Upgrade to 2050?</p>
            <button class="btn" onclick="goFuture()">YES, UPGRADE</button>
        </div>
    </div>

    <div id="future-ui">
        <h1 class="neon-title">BABU</h1>
        
        <div class="project">
            <h3>Bluebot Gas App</h3>
            <p>Smart Inventory Management</p>
        </div>
        <div class="project">
            <h3>Retail Solution</h3>
            <p>Digitizing Local Shops</p>
        </div>
        <div class="project">
            <h3>Web Developer</h3>
            <p>HTML, CSS, JS & Firebase</p>
        </div>
    </div>

    <script>
        function goFuture() {
            // Old UI ko hawa mein uda do (Fast transition)
            document.getElementById('old-ui').classList.add('fly-away');
            
            // Future UI ko turant dikhao
            setTimeout(() => {
                document.getElementById('future-ui').classList.add('active');
            }, 300);
        }
    </script>
</body>
</html>
