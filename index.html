<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saktiswarupa - Ultra Fast Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        /* --- OLD UI --- */
        #old-ui {
            position: fixed; inset: 0; background: #008080;
            display: flex; justify-content: center; align-items: center; z-index: 10;
            transition: all 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        /* Wind Animation Effect */
        .wind-away {
            transform: translateX(150vw) skewX(-20deg) scale(0.5);
            opacity: 0;
            filter: blur(10px);
            pointer-events: none;
        }

        .win98 { 
            background: #c0c0c0; border: 2px solid; border-color: #fff #0a0a0a #0a0a0a #fff; 
            width: 300px; padding: 2px; box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        .win98-header { background: #000080; color: white; padding: 4px 10px; font-size: 12px; font-weight: bold; }
        .win98-body { padding: 30px; text-align: center; color: #000; }
        .btn-old { 
            margin-top: 15px; padding: 8px 20px; cursor: pointer; background: #c0c0c0; 
            border: 2px solid; border-color: #fff #0a0a0a #0a0a0a #fff; font-weight: bold;
        }

        /* --- FUTURE UI (2050) --- */
        #future-ui {
            position: fixed; inset: 0; background: #020617;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #22d3ee; opacity: 0; transform: scale(1.1);
            transition: all 1s ease-out; z-index: 1;
        }

        #future-ui.active { opacity: 1; transform: scale(1); }

        .neon-title { 
            font-size: 2.5rem; text-transform: uppercase; letter-spacing: 4px;
            text-shadow: 0 0 15px #22d3ee; margin-bottom: 10px; font-family: sans-serif;
        }
        
        /* Chota Pulse Animation */
        .pulse {
            width: 10px; height: 10px; background: #22d3ee; border-radius: 50%;
            margin-bottom: 20px; box-shadow: 0 0 10px #22d3ee;
            animation: pulse-kf 1.5s infinite;
        }
        @keyframes pulse-kf { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

    </style>
</head>
<body>

    <div id="old-ui">
        <div class="win98">
            <div class="win98-header">Migration_Tool.exe</div>
            <div class="win98-body">
                <p style="font-size: 14px;">Old OS Detected.<br>Upgrade to 2050?</p>
                <button class="btn-old" onclick="triggerTransition()">UPGRADE</button>
            </div>
        </div>
    </div>

    <div id="future-ui">
        <div class="pulse"></div>
        <h1 class="neon-title">Saktiswarupa</h1>
        <p style="color: #64748b; font-size: 0.9rem; letter-spacing: 2px;">NEURAL INTERFACE READY</p>
    </div>

    <script>
        function triggerTransition() {
            const oldUI = document.getElementById('old-ui');
            const futureUI = document.getElementById('future-ui');

            // 1. Start Wind Effect (Fast & Smooth)
            oldUI.classList.add('wind-away');

            // 2. Show Future UI almost immediately
            setTimeout(() => {
                futureUI.classList.add('active');
            }, 400); // 0.4 second delay only
        }
    </script>
</body>
</html>
