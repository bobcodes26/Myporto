<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saktiswarupa - Fast Particle Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        /* --- OLD UI --- */
        #old-ui {
            position: fixed; inset: 0; background: #008080;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .win98 { background: #c0c0c0; border: 2px solid; border-color: #fff #0a0a0a #0a0a0a #fff; width: 320px; padding: 2px; }
        .win98-header { background: #000080; color: white; padding: 3px 10px; font-size: 12px; }
        .win98-content { padding: 25px; text-align: center; color: #000; }
        .btn-old { margin-top: 10px; padding: 5px 15px; cursor: pointer; background: #c0c0c0; border: 2px solid; border-color: #fff #0a0a0a #0a0a0a #fff; font-weight: bold; }

        /* --- CANVAS --- */
        #canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 11; }

        /* --- FUTURE UI --- */
        #future-ui {
            position: fixed; inset: 0; background: #02060c;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #64ffda; opacity: 0; transition: opacity 1.5s ease; z-index: 1;
        }
        #future-ui.active { opacity: 1; }
        .neon-text { font-size: 3rem; text-shadow: 0 0 10px #64ffda; margin-bottom: 15px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="old-ui">
        <div class="win98" id="box">
            <div class="win98-header">System.exe</div>
            <div class="win98-content">
                <p>Execute Evolution?</p>
                <button class="btn-old" onclick="blowAway()">YES</button>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="future-ui">
        <h1 class="neon-text">SAKTISWARUPA</h1>
        <p style="color: #8892b0;">VERSION 2050.0.1</p>
    </div>

    <script>
        async function blowAway() {
            const box = document.getElementById('box');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { alpha: false }); // Performance boost
            
            const snapshot = await html2canvas(box);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const rect = box.getBoundingClientRect();
            const imgData = snapshot.getContext('2d').getImageData(0, 0, snapshot.width, snapshot.height).data;
            
            document.getElementById('old-ui').style.display = 'none';

            let particles = [];
            // OPTIMIZATION: 'step' ko 6 rakha hai taaki kam particles bane par effect waisa hi rahe
            const step = 6; 

            for (let y = 0; y < snapshot.height; y += step) {
                for (let x = 0; x < snapshot.width; x += step) {
                    const i = (y * snapshot.width + x) * 4;
                    if (imgData[i + 3] > 0) {
                        particles.push({
                            x: x + rect.left,
                            y: y + rect.top,
                            vx: Math.random() * 15 + 5, // Fast wind speed
                            vy: (Math.random() - 0.5) * 8,
                            color: `rgb(${imgData[i]},${imgData[i+1]},${imgData[i+2]})`,
                            size: Math.random() * 4 + 1
                        });
                    }
                }
            }

            function frame() {
                ctx.fillStyle = "#000"; // Black background for canvas during animation
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                let active = false;
                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx += 0.5; // Acceleration
                    
                    if (p.x < canvas.width) {
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x, p.y, p.size, p.size);
                        active = true;
                    }
                }

                if (active) {
                    requestAnimationFrame(frame);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    document.getElementById('future-ui').classList.add('active');
                }
            }
            frame();
        }
    </script>
</body>
</html>
