<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saktiswarupa - Particle Dissolve Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        /* --- OLD UI (Windows Style) --- */
        #old-ui-container {
            position: fixed;
            inset: 0;
            background: #008080;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .win98-box {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #0a0a0a #0a0a0a #fff;
            width: 350px;
            padding: 2px;
        }

        .win98-title {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .win98-body {
            padding: 30px;
            text-align: center;
            color: #000;
        }

        .win98-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #0a0a0a #0a0a0a #fff;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- CANVAS FOR PARTICLES --- */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 11;
        }

        /* --- FUTURE UI (2050) --- */
        #future-ui {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #0d1b2a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00f2ff;
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 1;
        }

        #future-ui.show { opacity: 1; }

        .glitch-text {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-shadow: 0 0 15px #00f2ff;
            margin-bottom: 20px;
        }

        .neon-btn {
            border: 1px solid #00f2ff;
            padding: 10px 30px;
            color: #00f2ff;
            text-decoration: none;
            box-shadow: 0 0 10px #00f2ff;
            transition: 0.3s;
        }

        .neon-btn:hover { background: #00f2ff; color: #000; }
    </style>
</head>
<body>

    <div id="old-ui-container">
        <div class="win98-box" id="capture-target">
            <div class="win98-title">System Update</div>
            <div class="win98-body">
                <p>Old interface detected.</p>
                <button class="win98-btn" onclick="disintegrate()">EVOLVE TO 2050</button>
            </div>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div id="future-ui">
        <h1 class="glitch-text">SAKTISWARUPA</h1>
        <p style="margin-bottom: 30px; color: #888;">NEXT-GEN DEVELOPER & ENTREPRENEUR</p>
        <a href="#" class="neon-btn">ENTER SYSTEM</a>
    </div>

    <script>
        async function disintegrate() {
            const container = document.getElementById('old-ui-container');
            const target = document.getElementById('capture-target');
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            
            // 1. Old UI ki "Photo" lo (html2canvas)
            const snapshot = await html2canvas(target);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const rect = target.getBoundingClientRect();
            const data = snapshot.getContext('2d').getImageData(0, 0, snapshot.width, snapshot.height).data;
            
            // 2. Hide real Old UI
            container.style.opacity = '0';
            setTimeout(() => container.style.display = 'none', 500);

            // 3. Create Particles from Image Data
            let particles = [];
            for (let y = 0; y < snapshot.height; y += 4) {
                for (let x = 0; x < snapshot.width; x += 4) {
                    const i = (y * snapshot.width + x) * 4;
                    if (data[i + 3] > 0) { // Sirf wahi pixels jo transparent nahi hain
                        particles.push({
                            x: x + rect.left,
                            y: y + rect.top,
                            vx: (Math.random() - 0.5) * 10 + 5, // Right side hawa (wind)
                            vy: (Math.random() - 0.5) * 10 - 2,
                            color: `rgba(${data[i]},${data[i+1]},${data[i+2]},${data[i+3]})`,
                            size: Math.random() * 3
                        });
                    }
                }
            }

            // 4. Animation Loop
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx += 0.2; // Wind force
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                });

                if (particles[0].x < canvas.width + 200) {
                    requestAnimationFrame(animate);
                } else {
                    document.getElementById('future-ui').classList.add('show');
                }
            }
            animate();
        }
    </script>
</body>
</html>
