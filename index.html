<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saktiswarupa - Time Travel Portfolio</title>
    <style>
        /* --- CSS Reset & Basics --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* Transition ke time scroll rokne ke liye */
            background: #000;
        }

        /* =========================================
           1. OLD UI (Windows 98 Style)
           ========================================= */
        #old-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #008080; /* Teal background */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        /* Windows 98 Window Box */
        .win98-window {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #0a0a0a #0a0a0a #fff;
            width: 400px;
            max-width: 90%;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
        }

        .win98-title {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 10px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: space-between;
        }

        .win98-content {
            padding: 20px;
            color: #000;
            font-family: 'Times New Roman', serif;
            text-align: center;
        }

        .win98-content h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .win98-content p { font-size: 1rem; margin-bottom: 20px; }

        .win98-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #0a0a0a #0a0a0a #fff;
            padding: 5px 15px;
            cursor: pointer;
        }

        /* --- WIND VANISH ANIMATION (Keyframes) --- */
        @keyframes windVanish {
            0% {
                transform: translateX(0) translateY(0) rotate(0deg) scale(1);
                opacity: 1;
                filter: blur(0px);
            }
            20% {
                transform: translateX(50px) translateY(-20px) rotate(5deg);
                filter: blur(2px);
            }
            100% {
                transform: translateX(150vw) translateY(-100px) rotate(45deg) scale(0.5);
                opacity: 0;
                filter: blur(15px);
            }
        }

        /* Trigger class jo JS add karega */
        .vanish-out {
            animation: windVanish 1.5s ease-in forwards;
            pointer-events: none; /* Gayab hote waqt click na ho */
        }

        /* =========================================
           2. FUTURISTIC UI (2050 Style)
           ========================================= */
        #future-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a192f 0%, #02060c 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #64ffda; /* Neon blue/green */
            opacity: 0; /* Shuru mein hidden */
            transition: opacity 2s ease-in; /* Slow fade in */
            z-index: 1;
        }

        /* JS jab class lagayega tab dikhega */
        #future-ui.visible {
            opacity: 1;
            overflow-y: auto; /* Ab scroll kar sakte hain */
        }

        /* Futuristic Content Styling */
        .futuristic-container {
            text-align: center;
            font-family: 'Orbitron', sans-serif; /* You'd need to link this font, using sans-serif default for now */
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 20px;
        }

        .futuristic-container h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px #64ffda, 0 0 20px #64ffda;
            margin-bottom: 10px;
        }

        .futuristic-container p {
            color: #8892b0;
            margin-bottom: 40px;
        }

        .glow-btn {
            background: transparent;
            border: 1px solid #64ffda;
            color: #64ffda;
            padding: 15px 30px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 0 5px #64ffda;
        }

        .glow-btn:hover {
            background: rgba(100, 255, 218, 0.1);
            box-shadow: 0 0 15px #64ffda, 0 0 30px #64ffda;
        }

    </style>
</head>
<body>

    <div id="old-ui">
        <div class="win98-window">
            <div class="win98-title">
                <span>Welcome.exe</span>
                <span>[X]</span>
            </div>
            <div class="win98-content">
                <h1>Old Portfolio</h1>
                <p>Welcome to my classic website. Please update your browser to experience the future.</p>
                <button class="win98-btn" onclick="startTransition()">Enter Future</button>
            </div>
        </div>
    </div>

    <div id="future-ui">
        <div class="futuristic-container">
            <h1>SAKTISWARUPA 2050</h1>
            <p>INTEGRATED DIGITAL ARCHITECT | INNOVATOR</p>
            <a href="#" class="glow-btn">VIEW NEURAL PROJECTS</a>
        </div>
    </div>

    <script>
        function startTransition() {
            // A. Old UI elements select karein
            const oldUI = document.getElementById('old-ui');
            const futureUI = document.getElementById('future-ui');

            // B. Wind vanish animation trigger karein
            oldUI.classList.add('vanish-out');

            // C. Animation khatam hone ka wait karein (1.5s), fir future UI dikhayein
            setTimeout(() => {
                oldUI.style.display = 'none'; // Old UI ko completely remove karein
                futureUI.classList.add('visible'); // Future UI fade in
                document.body.style.overflow = 'auto'; // Scrolling enable karein
            }, 1500); // 1.5 seconds delay (matches animation duration)
        }
    </script>
</body>
</html>
